<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Live Stats Pro ⚽</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <h1>Fútbol<span>Pro</span></h1>
        </div>
        <div class="live-indicator">
            <span class="dot-pulse"></span>
            <span>EN DIRECTO</span>
        </div>
    </header>

    <main class="container">
        <header class="section-header">
            <h2>Partidos Destacados</h2>
            <button id="refresh-btn" class="btn-refresh">↻ Actualizar</button>
        </header>
        
        <div id="matches-grid" class="matches-grid">
            <div class="loader" id="loader">Cargando estadísticas...</div>
            </div>
    </main>
<div class="container">
    <header class="section-header" style="margin-top: 2rem;">
        <h2>Top Goleadores por Liga</h2>
    </header>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
        
        <div class="scorers-container">
            <h3 style="margin-bottom: 1rem; color: var(--text-primary);">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</h3>
            <div id="scorers-39">
                <div class="loader">Cargando Premier...</div>
            </div>
        </div>

        <div class="scorers-container">
            <h3 style="margin-bottom: 1rem; color: var(--text-primary);">La Liga 🇪🇸</h3>
            <div id="scorers-140">
                <div class="loader">Cargando La Liga...</div>
            </div>
        </div>
 <div class="scorers-container">
            <h3 style="margin-bottom: 1rem; color: var(--text-primary);">Champions League 🇪🇺</h3>
            <div id="scorers-2">
                <div class="loader">Cargando Champions...</div>
            </div>
        </div>

    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
